<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PokeApi</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>

        <header>
            <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi.svg?sanitize=true" id ="pokeapi">
        </header>

        <main>
            <div>
                <input type="text" id="pokemon-nome" placeholder="Digite o nome de um pokemon">
                <button onclick="buscarPokemon()">Buscar</button>
                <select id="typeFilter" name="Tipos" onchange="filtrarTipo()">
                    <option value="">Todos</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                    <option value="grass">Grass</option>
                    <option value="electric">Electric</option>
                    <option value="ice">Ice</option>
                    <option value="fighting">Fighting</option>
                    <option value="poison">Poison</option>
                    <option value="ground">Ground</option>
                    <option value="flying">Flying</option>
                    <option value="psychic">Psychic</option>
                    <option value="bug">Bug</option>
                    <option value="rock">Rock</option>
                    <option value="ghost">Ghost</option>
                    <option value="dragon">Dragon</option>
                    <option value="dark">Dark</option>
                    <option value="steel">Steel</option>
                    <option value="fairy">Fairy</option>
                </select>
            </div>

            <div id="pokedex"></div>
        </main>

        <div id="modal-overlay" onclick="fecharModal()">
            <div id="modal" onclick="event.stopPropagation()">
                <button id="modal-fechar" onclick="fecharModal()">✕</button>
                <img id="modal-img" src="" alt="">
                <h2 id="modal-nome"></h2>
                <p id="modal-tipos"></p>
                <div id="modal-stats"></div>
            </div>
        </div>

        <script src="script.js"></script>   
    </body>

</html>
